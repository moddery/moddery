services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:13001/graphql
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '15175:4173'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://moddery:moddery@postgres:5432/moddery?schema=public
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      OPENSEARCH_NODE: http://opensearch:9200
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: moddery
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: http://localhost:9002
      S3_PUBLIC_BASE_URL: http://localhost:9002/moddery-dev
    healthcheck:
      test: 'bun -e "fetch(\"http://127.0.0.1:3000/health/ready\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - '13001:3000'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moddery
      POSTGRES_PASSWORD: moddery
      POSTGRES_USER: moddery
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moddery -d moddery']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '6380:6379'
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - '1026:1025'
      - '8026:8025'

  clamav:
    image: clamav/clamav-debian:1.4_base
    environment:
      CLAMAV_NO_MILTERD: 'true'
    healthcheck:
      test:
        - CMD-SHELL
        - echo PING | nc -w 5 127.0.0.1 3310 | grep PONG
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    ports:
      - '127.0.0.1:3310:3310'
    volumes:
      - clamav-data:/var/lib/clamav

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:9200/_cluster/health
      interval: 10s
      timeout: 5s
      retries: 30
    ports:
      - '9200:9200'
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: moddery
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --spider
        - http://127.0.0.1:8123/ping
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - '8123:8123'
      - '9004:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:15174,http://localhost:15175,http://localhost:5173,http://localhost:5180,http://127.0.0.1:15174,http://127.0.0.1:15175,http://127.0.0.1:5173,http://127.0.0.1:5180
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '9002:9000'
      - '9003:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/moddery-dev &&
        mc anonymous set download local/moddery-dev

volumes:
  clamav-data:
  clickhouse-data:
  minio-data:
  opensearch-data:
  postgres-data:
  redis-data:
