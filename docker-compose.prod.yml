services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - '80:80'
      - '443:443'
    restart: unless-stopped
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: ${PUBLIC_API_URL}/graphql
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: bun run prisma:migrate:deploy
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      OPENSEARCH_NODE: http://opensearch:9200
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: ${PUBLIC_STORAGE_URL}
      S3_PUBLIC_BASE_URL: ${PUBLIC_STORAGE_URL}/${S3_BUCKET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      TRUST_PROXY_HOPS: 1
    healthcheck:
      test: 'bun -e "fetch(\"http://127.0.0.1:3000/health/ready\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - redis-data:/data

  clamav:
    image: clamav/clamav-debian:1.4_base
    environment:
      CLAMAV_NO_MILTERD: 'true'
    healthcheck:
      test:
        - CMD-SHELL
        - echo PING | nc -w 5 127.0.0.1 3310 | grep PONG
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:9200/_cluster/health
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --spider
        - http://127.0.0.1:8123/ping
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_WEB_URL}
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$S3_BUCKET" &&
        mc anonymous set download "local/$$S3_BUCKET"
    env_file:
      - .env.production
    restart: 'no'

volumes:
  caddy-config:
  caddy-data:
  clamav-data:
  clickhouse-data:
  minio-data:
  opensearch-data:
  postgres-data:
  redis-data:
