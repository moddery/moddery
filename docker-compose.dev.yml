services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    command:
      - /bin/sh
      - -c
      - bun install --frozen-lockfile && bun run --filter @moddery/web dev
    environment:
      VITE_GRAPHQL_URL: http://localhost:13001/graphql
    ports:
      - '15174:5173'
    volumes:
      - ./apps/web/package.json:/app/apps/web/package.json
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts
      - ./bun.lockb:/app/bun.lockb
      - ./package.json:/app/package.json
      - ./packages/shared/src:/app/packages/shared/src

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: deps
    command:
      - /bin/sh
      - -c
      - cd /app/apps/api && bun run prisma:generate && bun run start:dev
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/api/nest-cli.json:/app/apps/api/nest-cli.json
      - ./apps/api/package.json:/app/apps/api/package.json
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/tsconfig.build.json:/app/apps/api/tsconfig.build.json
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./packages/shared/src:/app/packages/shared/src
