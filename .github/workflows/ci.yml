name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moddery
          POSTGRES_PASSWORD: moddery
          POSTGRES_USER: moddery
        options: >-
          --health-cmd "pg_isready -U moddery -d moddery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://moddery:moddery@localhost:5432/moddery?schema=public
      JWT_ACCESS_TOKEN_SECRET: ci-access-token-secret-at-least-thirty-two-chars
      JWT_ACCESS_TOKEN_TTL_SECONDS: 900
      MAIL_FROM: noreply@moddery.local
      CLICKHOUSE_DATABASE: moddery
      CLICKHOUSE_PASSWORD: ''
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_USERNAME: default
      NODE_ENV: test
      OPENSEARCH_NODE: http://localhost:9200
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_USERNAME: admin
      PORT: 3000
      S3_ACCESS_KEY_ID: test
      S3_BUCKET: moddery-test
      S3_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: test
      SMTP_HOST: localhost
      SMTP_PORT: 1025

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run --filter @moddery/api prisma:generate
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Check formatting
        run: bun run format:check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Apply migrations
        run: bun run --filter @moddery/api prisma:migrate:deploy
