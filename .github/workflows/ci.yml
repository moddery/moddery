name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moddery
          POSTGRES_PASSWORD: moddery
          POSTGRES_USER: moddery
        options: >-
          --health-cmd "pg_isready -U moddery -d moddery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://moddery:moddery@localhost:5432/moddery?schema=public
      JWT_ACCESS_TOKEN_SECRET: ci-access-token-secret-at-least-thirty-two-chars
      JWT_ACCESS_TOKEN_TTL_SECONDS: 900
      MAIL_FROM: noreply@moddery.local
      CLICKHOUSE_DATABASE: moddery
      CLICKHOUSE_PASSWORD: ''
      CLICKHOUSE_URL: http://localhost:8123
      CLICKHOUSE_USERNAME: default
      NODE_ENV: test
      OPENSEARCH_NODE: http://localhost:9200
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_USERNAME: admin
      PORT: 3000
      S3_ACCESS_KEY_ID: test
      S3_BUCKET: moddery-test
      S3_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_REGION: us-east-1
      S3_SECRET_ACCESS_KEY: test
      SMTP_HOST: localhost
      SMTP_PORT: 1025

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run --filter @moddery/api prisma:generate
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Check formatting
        run: bun run format:check
      - name: Scan source terms
        run: bun run scan:source
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Apply migrations
        run: bun run --filter @moddery/api prisma:migrate:deploy

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run --filter @moddery/api prisma:generate
      - name: Start Docker development stack
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
      - name: Wait for API readiness
        run: |
          until curl -fsS http://localhost:13001/health/ready >/dev/null; do
            docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
            sleep 5
          done
      - name: Wait for web readiness
        run: |
          until curl -fsS http://localhost:15174 >/dev/null; do
            docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
            sleep 5
          done
      - name: Smoke test Docker stack
        env:
          SMOKE_DATABASE_URL: postgresql://moddery:moddery@localhost:5433/moddery?schema=public
          SMOKE_SEED_FIXTURES: 'true'
          SMOKE_WEB_URL: http://localhost:15174
        run: bun run smoke:local
      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --no-color --tail=250
      - name: Stop Docker development stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v
